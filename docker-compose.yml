services:
  db:
    image: postgres:16-alpine
    container_name: forgers-ats-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: forgers
      POSTGRES_PASSWORD: forgers
      POSTGRES_DB: forgers_ats
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U forgers -d forgers_ats']
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forgers-ats-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: 'postgresql://forgers:forgers@db:5432/forgers_ats?schema=public'
      NODE_ENV: production
    ports:
      - '3000:3000'

volumes:
  pgdata:
